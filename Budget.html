<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelNest - Budget Planner</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/Budget.css">
</head>
<body>
    <div id="nav-placeholder"></div>

    <section class="page-hero">
        <h1>Travel Budget Planner</h1>
        <p>Plan your trip costs by destination and budget wisely</p>
    </section>

    <div class="budget-wrapper">
        <section class="form-wrap">
            <form class="form-card form-card--wide" id="budgetForm">
                <p class="section-sub">Budget</p>
                <h2>Calculate Your Trip Cost</h2>
                
                <select id="destination" required>
                    <option value="">Select Destination</option>
                </select>
                
                <input type="number" id="days" placeholder="Number of days" min="1" required>
                <input type="number" id="dailyBudget" placeholder="Daily budget per person ($)" min="0" required>
                
                <button type="submit" class="btn btn-primary">Calculate Budget</button>
                
                <div class="result-container" id="resultContainer" style="display: none;">
                    <div class="result-header">
                        <h3>Trip Budget Summary</h3>
                        <span class="budget-status" id="budgetStatus">Moderate</span>
                    </div>
                    
                    <div class="budget-details">
                        <div class="detail-row">
                            <span>Total Trip Cost:</span>
                            <span class="total-cost" id="totalCost">$0</span>
                        </div>
                        <div class="detail-row">
                            <span>Budget Level:</span>
                            <span id="budgetCategory">-</span>
                        </div>
                    </div>
                    
                    <button type="button" class="btn btn-secondary" id="saveTripBtn">Save Trip</button>
                </div>
            </form>
        </section>

        <section class="saved-trips-section">
            <div class="form-card">
                <p class="section-sub">Saved Trips</p>
                <h3>Your Trip History</h3>
                <div id="savedTripsList" class="trips-list">
                    <p class="empty-message">No saved trips yet. Calculate and save one!</p>
                </div>
                <button type="button" class="btn btn-clear-all" id="clearAllBtn" style="display: none;">Clear All Trips</button>
            </div>
        </section>
    </div>

    <div id="footer-placeholder"></div>
    <script src="js/global.js"></script>
    <script src="js/Budget.js"></script>
</body>
</html>
